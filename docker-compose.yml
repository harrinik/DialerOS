###############################################################################
# DialerOS — Docker Compose
#
# Architecture:
#   - Asterisk runs on the HOST (install with install_asterisk.sh or setup.sh)
#     → avoids RTP/NAT issues that plague Asterisk-in-Docker
#   - Redis, MongoDB, API, Worker, Listener run in Docker containers
#
# Quick start:
#   sudo bash setup.sh      ← installs everything (recommended)
#   docker compose up -d    ← if Asterisk and .env are already set up
###############################################################################

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"   # bind to localhost only — not public
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-changeme}
      MONGO_INITDB_DATABASE: dialer
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"     # bind to localhost only — not public
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── API (Next.js dashboard + REST API) ───────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # MongoDB
      MONGODB_URI: "mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-changeme}@mongo:27017/dialer?authSource=admin"
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      # JWT
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_secret_change_me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_secret_change_me}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      # Asterisk ARI — Asterisk runs on the HOST
      ARI_HOST: host.docker.internal
      ARI_PORT: "8088"
      ARI_USERNAME: ${ARI_USERNAME:-dialer}
      ARI_PASSWORD: ${ARI_PASSWORD:-changeme}
      ARI_APP_NAME: dialer
      ARI_TLS: "false"
      # Asterisk AMI — Asterisk runs on the HOST
      AMI_HOST: host.docker.internal
      AMI_PORT: "5038"
      AMI_USER: ${AMI_USER:-dialer}
      AMI_PASSWORD: ${AMI_PASSWORD:-changeme}
      # Directories (must be bind-mounted from host below)
      AST_SOUNDS_DIR: /var/lib/asterisk/sounds/dialer
      AST_RECORDINGS_DIR: /var/spool/asterisk/monitor
      ASTERISK_CONF_DIR: /etc/asterisk
      # URLs
      NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:3001}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets containers reach the host
    volumes:
      # Bind-mount Asterisk directories so the API can read/write audio files
      - /var/lib/asterisk/sounds/dialer:/var/lib/asterisk/sounds/dialer
      - /var/spool/asterisk/monitor:/var/spool/asterisk/monitor
      # Bind-mount Asterisk config dir so push_dialplan can write extensions_dialer.conf
      # Remove this if you don't want the API to have write access to Asterisk config
      - /etc/asterisk:/etc/asterisk
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Dialer Worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 2
    environment:
      NODE_ENV: production
      MONGODB_URI: "mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-changeme}@mongo:27017/dialer?authSource=admin"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      ARI_HOST: host.docker.internal
      ARI_PORT: "8088"
      ARI_USERNAME: ${ARI_USERNAME:-dialer}
      ARI_PASSWORD: ${ARI_PASSWORD:-changeme}
      ARI_APP_NAME: dialer
      AMI_HOST: host.docker.internal
      AMI_PORT: "5038"
      AMI_USER: ${AMI_USER:-dialer}
      AMI_PASSWORD: ${AMI_PASSWORD:-changeme}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
      WORKER_RATE_LIMIT_MAX: ${WORKER_RATE_LIMIT_MAX:-10}
      WORKER_RATE_LIMIT_DURATION: ${WORKER_RATE_LIMIT_DURATION:-1000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Realtime Listener (WebSocket gateway) ─────────────────────────────────
  listener:
    build:
      context: .
      dockerfile: apps/listener/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      MONGODB_URI: "mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-changeme}@mongo:27017/dialer?authSource=admin"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      ARI_HOST: host.docker.internal
      ARI_PORT: "8088"
      ARI_USERNAME: ${ARI_USERNAME:-dialer}
      ARI_PASSWORD: ${ARI_PASSWORD:-changeme}
      ARI_APP_NAME: dialer
      AMI_HOST: host.docker.internal
      AMI_PORT: "5038"
      AMI_USER: ${AMI_USER:-dialer}
      AMI_PASSWORD: ${AMI_PASSWORD:-changeme}
      GATEWAY_PORT: "3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
